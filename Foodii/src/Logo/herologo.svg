<!-- foodii-horizontal.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="760" height="160" viewBox="0 0 760 160" role="img" aria-labelledby="title desc">
  <title id="title">Foodii — logo</title>
  <desc id="desc">A vibrant Gen Z style logo: playful bowl with steam forming the double i, and rounded wordmark.</desc>

  <defs>
    <linearGradient id="g1" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#FF6B6B"/>
      <stop offset="0.45" stop-color="#FF9A6B"/>
      <stop offset="1" stop-color="#8E63FF"/>
    </linearGradient>

    <filter id="softShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#8E63FF" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- Background (transparent) -->

  <!-- Mark: bowl + steam -->
  <g transform="translate(28,18)" filter="url(#softShadow)">
    <!-- circular colorful blob behind -->
    <circle cx="60" cy="44" r="44" fill="url(#g1)" opacity="0.95"/>

    <!-- bowl -->
    <path d="M24 72 C34 88, 86 88, 96 72 L96 66 C96 66,80 84,48 84 C16 84,0 66,0 66 Z"
          fill="#fff" fill-opacity="0.96" transform="translate(0,-6) scale(0.9) translate(3,7)"/>

    <!-- bowl rim -->
    <path d="M18 58 C34 74, 86 74, 102 58"
          stroke="#fff" stroke-opacity="0.95" stroke-width="4" stroke-linecap="round" fill="none" transform="translate(0,-6) scale(0.9) translate(3,7)"/>

    <!-- steam lines forming the 'ii' -->
    <g transform="translate(46,6)" stroke="#fff" stroke-width="4" stroke-linecap="round" fill="none" stroke-linejoin="round">
      <!-- left steam -->
      <path d="M6 6 C2 -2, 12 -18, 6 -34" stroke-opacity="0.95"/>
      <!-- right steam (creates the second 'i' vibe) -->
      <path d="M24 6 C20 -2, 30 -18, 24 -34" stroke-opacity="0.95"/>
      <!-- little dot-ish steam accents -->
      <circle cx="6" cy="8" r="1.8" fill="#fff" fill-opacity="0.95"/>
      <circle cx="24" cy="8" r="1.8" fill="#fff" fill-opacity="0.95"/>
    </g>
  </g>

  <!-- Wordmark -->
  <g transform="translate(160,96)">
    <!-- Foodii text -->
    <text x="0" y="0"
          font-family="Inter, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-weight="700"
          font-size="48"
          letter-spacing="-1"
          fill="url(#g1)"
          transform="translate(0,10)">
      Foodii
    </text>

    <!-- subtle subline -->
    <text x="0" y="44"
          font-family="Inter, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif"
          font-weight="500"
          font-size="12"
          fill="#6b6b6b"
          opacity="0.9">
      fresh bites — fast vibes
    </text>
  </g>
</svg>
